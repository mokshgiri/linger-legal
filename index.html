<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Linger — Legal</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d0a14;
    color: #ece6f5;
    min-height: 100vh;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 24px;
  }
  .brand {
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #ff5d8f;
    margin-bottom: 12px;
  }
  h1 {
    margin: 0 0 32px;
    font-size: 42px;
    background: linear-gradient(90deg, #ff5d8f, #ff8a65);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .links { display: grid; gap: 12px; max-width: 320px; margin: 0 auto; }
  a {
    display: block;
    padding: 14px 22px;
    border: 1px solid #2a2233;
    border-radius: 12px;
    color: #ece6f5;
    text-decoration: none;
    background: #16111f;
    transition: border-color .15s ease;
  }
  a:hover { border-color: #ff5d8f; }
  footer { margin-top: 48px; color: #a59bb3; font-size: 13px; }
</style>
</head>
<body>
<div>
  <div class="brand">Linger</div>
  <h1>Legal</h1>
  <div class="links">
    <a href="privacy-policy.html">Privacy Policy</a>
    <a href="terms-and-conditions.html">Terms &amp; Conditions</a>
  </div>
  <footer>&copy; 2026 MindcraftAI</footer>
</div>
</body>
</html>
